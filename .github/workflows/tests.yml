name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: novareef_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, pdo, pdo_mysql, gd, zip, dom, curl, intl, fileinfo
          coverage: none
          tools: composer:v2

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cachear dependencias de Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Instalar dependencias PHP
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Instalar dependencias JS
        run: npm ci

      - name: Compilar assets (Vite)
        run: npm run build

      - name: Preparar entorno
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Esperar a MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h127.0.0.1 -P3306 -uroot --silent && break
            sleep 2
          done

      - name: Migrar base de datos
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: novareef_test
          DB_USERNAME: root
          DB_PASSWORD: ""
        run: php artisan migrate --force

      - name: Correr la suite de tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: novareef_test
          DB_USERNAME: root
          DB_PASSWORD: ""
        run: php artisan test
